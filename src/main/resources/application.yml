spring:
  application:
    name: heness-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/heness?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:heness}
    password: ${SPRING_DATASOURCE_PASSWORD:not-configured}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${DATABASE_ENABLED:false}
    locations: classpath:db/migration
server:
  port: ${BACKEND_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:3000}
  ai:
    enabled: ${AI_ENABLED:false}
    base-url: ${AI_BASE_URL:https://api.openai.com}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4.1-mini}
